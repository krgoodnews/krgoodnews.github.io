<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>리다이렉트</title>
  <script>
    const path = window.location.pathname;
    const slugPattern = /^\/([A-Za-z0-9]{6})$/;
    
    if (slugPattern.test(path)) {
      window.location.replace('https://tldr.yunsu.dev' + path);
    } else {
      window.location.replace('https://yunsu.dev');
    }
  </script>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
  </style>
</head>
<body>
  <div>
    <h1>리다이렉트 중...</h1>
  </div>
</body>
</html>
